<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>

<link rel="stylesheet" href="style.css">

</head>

<body>



<nav>

<div class="logo">
🎓 College Event Manager
</div>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="privacy.html">Privacy</a></li>
</ul>

</nav>

<section class="details">
<div class="payment-box">

<h1>💳 Complete Payment</h1>

<p>
Review your registration details before making payment.
</p>
<div class="summary-grid">

<div class="summary-card">
<h3>Name</h3>
<p id="studentName"></p>
</div>

<div class="summary-card">
<h3>Event</h3>
<p id="eventName"></p>
</div>

<div class="summary-card">
<h3>Amount</h3>
<p>₹1000</p>
</div>

</div>
<button
class="submit-btn"
onclick="payNow()">

🟢 Pay ₹1000

</button>

</div>

</section>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

const student = JSON.parse(localStorage.getItem("studentData"));

if(student){

document.getElementById("studentName").innerHTML = student.fullname;
document.getElementById("eventName").innerHTML = student.event;

}
async function payNow() {

    try {

        const order = await fetch("/create-order", {
            method: "POST"
        }).then(res => res.json());




        const options ={



            key:"rzp_test_TF3qbmTT7mP3gU",

            amount: order.amount,

            currency: order.currency,

            name: "College Event Manager",

            description: student.event,

            order_id: order.id,

method: {
    card: true
},

modal: {
    escape: false
},

prefill: {

    name: student.fullname,

    email: student.email

},
            prefill: {

                name: student.fullname,

                email: student.email

            },

            theme: {

                color: "#2563eb"

            },

            handler: async function (response) {

                const register = await fetch("/register", {

                    method: "POST",

                    headers: {

                        "Content-Type": "application/json"

                    },

                  body: JSON.stringify({

    ...student,

    razorpay_order_id: response.razorpay_order_id,

    razorpay_payment_id: response.razorpay_payment_id

})  

                });

                const data = await register.json();
                 console.log("Register API Response:", data);
                if (data.success) {

                    student.registrationId = data.id;

                    student.paymentId = response.razorpay_payment_id;

                    localStorage.setItem(
                        "studentData",
                        JSON.stringify(student)
                    );

                    window.location.href = "receipt.html";

                } else {
               alert(data.message || JSON.stringify(data));

                }

            }

        };
        console.log(order);
console.log(options);
        const rzp = new Razorpay(options);

        rzp.open();

    }
catch (err) {

    console.error(err);

    alert(err.message);

}

}
</script>
</body>
</html>
