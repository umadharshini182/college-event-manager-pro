<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.paypal.com/sdk/js?client-id=EOJ2rUhfKQfTfB0S9d3kxtBP8-x3jiOArmSub7AtOGdxHxJL0M_twxMYqyqtY7pikKFOGnkJyiEXFO8L&currency=USD"></script>

</head>

<body>

<nav>

<div class="logo">
🎓 College Event Manager
</div>

<ul>

<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="privacy.html">Privacy</a></li>

</ul>

</nav>

<section class="details">

<div class="payment-box">

<h1>💳 Complete Payment</h1>

<p>
Review your registration details before making payment.
</p>

<div class="summary-grid">

<div class="summary-card">

<h3>Name</h3>

<p id="studentName"></p>

</div>

<div class="summary-card">

<h3>Event</h3>

<p id="eventName"></p>

</div>

<div class="summary-card">

<h3>Amount</h3>

<p>$12.00</p>

</div>

</div>

<div id="paypal-button-container"></div>

</div>

</section>

<script>
  const student = JSON.parse(localStorage.getItem("studentData"));

if (student) {

    document.getElementById("studentName").innerHTML = student.fullname;
    document.getElementById("eventName").innerHTML = student.event;

}

paypal.Buttons({

    createOrder: async function () {

        try {

            const response = await fetch("/create-paypal-order", {

                method: "POST"

            });

            const order = await response.json();

            return order.id;

        }

        catch (err) {

            console.log(err);

            alert("Unable to create PayPal order.");

        }

    },

    onApprove: async function (data, actions) {

        const details = await actions.order.capture();

        console.log(details);
               const register = await fetch("/register", {

            method: "POST",

            headers: {

                "Content-Type": "application/json"

            },

            body: JSON.stringify({

                ...student,

                paypal_order_id: data.orderID,

                paypal_transaction_id: details.id

            })

        });

        const result = await register.json();

        if (result.success) {

            student.registrationId = result.id;

            student.paymentId = details.id;

            localStorage.setItem(
                "studentData",
                JSON.stringify(student)
            );

            window.location.href = "receipt.html";

        }

        else {

            alert(result.message || "Registration failed.");

        }

    },

    onError: function (err) {

        console.log(err);

        alert("Payment Failed.");

    }

}).render("#paypal-button-container");   
</script>

</body>

</html>
