<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings | College Event Manager</title>

<link rel="stylesheet" href="admin.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div id="overlay" class="overlay"></div>

<!-- ===========================
SIDEBAR
=========================== -->

<div class="sidebar" id="sidebar">

<div class="sidebar-header">

<h2>🎓 CEM</h2>

<button id="closeSidebar" class="close-btn">
✕
</button>

</div>

<a href="dashboard.html">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="events-admin.html">
<i class="fa-solid fa-calendar-days"></i>
Events
</a>

<a href="payments.html">
<i class="fa-solid fa-money-bill-wave"></i>
Payments
</a>

<a href="settings.html" class="active">
<i class="fa-solid fa-gear"></i>
Settings
</a>

<a href="#" onclick="logout()">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</a>

</div>

<!-- ===========================
MAIN
=========================== -->

<div class="main">
<!-- ===========================
TOPBAR
=========================== -->

<div class="topbar">

<div class="top-left">

<button id="menuBtn" class="menu-btn">

<i class="fa-solid fa-bars"></i>

</button>

<div>

<h1>Settings</h1>

<p class="welcome">

Manage your account and dashboard preferences

</p>

</div>

</div>

</div>

<!-- ===========================
SETTINGS GRID
=========================== -->

<div class="settings-grid">

<!-- PROFILE -->

<div class="setting-card">

<h2>

<i class="fa-solid fa-user"></i>

Profile

</h2>

<div class="profile-center">

<img

id="profilePreview"

class="settings-profile"

src="https://ui-avatars.com/api/?name=Administrator&background=2563EB&color=fff">

<input

type="file"

id="profileImage"

accept="image/*">

</div>

</div>

<!-- SECURITY -->

<div class="setting-card">

<h2>

<i class="fa-solid fa-lock"></i>

Security

</h2>

<div class="input-group">

<label>

<i class="fa-solid fa-key"></i>

New Password

</label>

<input

type="password"

id="newPassword"

placeholder="Enter new password">

</div>

<div class="input-group">

<label>

<i class="fa-solid fa-lock"></i>

Confirm Password

</label>

<input

type="password"

id="confirmPassword"

placeholder="Confirm password">

</div>

</div>

<!-- PREFERENCES -->

<div class="setting-card">

<h2>

<i class="fa-solid fa-sliders"></i>

Preferences

</h2>

<div class="input-group">

<label>

<i class="fa-solid fa-palette"></i>

Theme

</label>

<select id="theme">

<option>Light Mode</option>

<option>Dark Mode</option>

</select>

</div>

<div class="input-group">

<label>

<i class="fa-solid fa-bell"></i>

Email Notifications

</label>

<select id="notification">

<option>Enabled</option>

<option>Disabled</option>

</select>

</div>

<div class="input-group">

<label>

<i class="fa-solid fa-award"></i>

Certificate Download

</label>

<select id="certificate">

<option>Enabled</option>

<option>Disabled</option>

</select>

</div>

</div>

</div>

<div style="text-align:center;margin:40px 0;">

<button

id="saveSettingsBtn"

class="save-btn">

<i class="fa-solid fa-floppy-disk"></i>

Save Changes

</button>

</div>

<!-- ===========================
FOOTER
=========================== -->

<footer>

<div class="footer-content">

<p>

© 2027 College Event Manager

</p>

<p>

Professional Settings Module

</p>

</div>

</footer>

</div>

<script src="settings.js"></script>

</body>

</html>
