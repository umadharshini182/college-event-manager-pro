<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings | College Event Manager</title>

<link rel="stylesheet" href="admin.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>
<body>

<!-- ==========================================
SIDEBAR
========================================== -->

<div class="sidebar" id="sidebar">

<div class="sidebar-header">

<h2>🎓 CEM</h2>

<button id="closeSidebar" class="close-btn">

<i class="fa-solid fa-xmark"></i>

</button>

</div>

<a href="admin.html">

<i class="fa-solid fa-chart-line"></i>

Dashboard

</a>

<a href="events-admin.html">

<i class="fa-solid fa-calendar-days"></i>

Events

</a>

<a href="payments.html">

<i class="fa-solid fa-money-bill-wave"></i>

Payments

</a>

<a href="settings-admin.html" class="active">

<i class="fa-solid fa-gear"></i>

Settings

</a>

<a href="#" onclick="logout()">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</a>

</div>

<div id="overlay" class="overlay"></div>

<!-- ==========================================
MAIN
========================================== -->

<div class="main">

<!-- ==========================================
TOPBAR
========================================== -->

<div class="topbar">

<div class="top-left">

<button id="menuBtn" class="menu-btn">

<i class="fa-solid fa-bars"></i>

</button>

<div>

<h1>⚙️ Settings</h1>

<p class="welcome">

Manage your account and dashboard preferences

</p>

</div>

</div>

<div class="top-right">

<div class="profile">

<img
id="topProfilePreview"
src="https://ui-avatars.com/api/?name=Administrator&background=2563EB&color=fff"
alt="Administrator">

<div class="profile-info">

<h4>Administrator</h4>

<p>admin@gmail.com</p>

<small>Super Admin</small>

</div>

</div>

</div>

</div>
<!-- ==========================================
PROFILE CARD
========================================== -->

<div class="settings-card">

<div class="settings-title">

<i class="fa-solid fa-user"></i>

<h2>Profile Information</h2>

</div>

<div class="settings-grid">

<div class="profile-left">

<img
id="profilePreview"
class="profile-large"
src="https://ui-avatars.com/api/?name=Administrator&background=2563EB&color=fff"
alt="Administrator">

<input
type="file"
id="profileImage"
accept="image/*">

</div>

<div class="profile-right">

<div class="input-group">

<label>

Full Name

</label>

<input
type="text"
value="Administrator"
readonly>

</div>

<div class="input-group">

<label>

Email Address

</label>

<input
type="email"
value="admin@gmail.com"
readonly>

</div>

<div class="input-group">

<label>

Role

</label>

<input
type="text"
value="Super Administrator"
readonly>

</div>

</div>

</div>

</div>
<!-- ==========================================
SECURITY CARD
========================================== -->

<div class="settings-card">

<div class="settings-title">

<i class="fa-solid fa-lock"></i>

<h2>Security</h2>

</div>

<div class="settings-grid">

<div class="input-group">

<label>

Current Password

</label>

<input
type="password"
id="currentPassword"
placeholder="Enter current password">

</div>

<div class="input-group">

<label>

New Password

</label>

<input
type="password"
id="newPassword"
placeholder="Enter new password">

</div>

<div class="input-group">

<label>

Confirm Password

</label>

<input
type="password"
id="confirmPassword"
placeholder="Confirm new password">

</div>

</div>

</div>
<!-- ==========================================
PREFERENCES CARD
========================================== -->

<div class="settings-card">

<div class="settings-title">

<i class="fa-solid fa-sliders"></i>

<h2>Preferences</h2>

</div>

<div class="settings-grid">

<div class="input-group">

<label>

Theme

</label>

<select id="theme">

<option value="Light Mode">

☀️ Light Mode

</option>

<option value="Dark Mode">

🌙 Dark Mode

</option>

</select>

</div>

<div class="input-group">

<label>

Email Notifications

</label>

<select id="notification">

<option value="Enabled">

✅ Enabled

</option>

<option value="Disabled">

❌ Disabled

</option>

</select>

</div>

<div class="input-group">

<label>

Certificate Download

</label>

<select id="certificate">

<option value="Enabled">

✅ Enabled

</option>

<option value="Disabled">

❌ Disabled

</option>

</select>

</div>

<div class="input-group">

<label>

Dashboard Auto Refresh

</label>

<select id="autoRefresh">

<option value="5">

Every 5 Seconds

</option>

<option value="10">

Every 10 Seconds

</option>

<option value="30">

Every 30 Seconds

</option>

</select>

</div>

</div>

</div>

<!-- ==========================================
SAVE SETTINGS
========================================== -->

<div class="settings-card">

<div class="settings-title">

<i class="fa-solid fa-floppy-disk"></i>

<h2>Save Settings</h2>

</div>

<div class="settings-buttons">

<button
id="saveSettingsBtn"
class="save-btn">

<i class="fa-solid fa-floppy-disk"></i>

Save Changes

</button>

<button
id="resetSettingsBtn"
class="reset-btn"
type="button">

<i class="fa-solid fa-rotate-left"></i>

Reset Settings

</button>

</div>

</div>

<!-- ==========================================
FOOTER
========================================== -->

<footer>

<div class="footer-content">

<p>

© 2027 College Event Manager

</p>

<p>

Professional Admin Settings

</p>

</div>

</footer>

</div>

<script src="settings.js"></script>

</body>

</html>
