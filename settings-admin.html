<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings | College Event Manager</title>

<link rel="stylesheet" href="admin.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div id="overlay" class="overlay"></div>

<!-- ===========================
SIDEBAR
=========================== -->

<div class="sidebar" id="sidebar">

<div class="sidebar-header">

<h2>🎓 CEM</h2>

<button id="closeSidebar" class="close-btn">
✕
</button>

</div>

<a href="dashboard.html">
<i class="fa-solid fa-chart-line"></i>
Dashboard
</a>

<a href="events-admin.html">
<i class="fa-solid fa-calendar-days"></i>
Events
</a>

<a href="payments.html">
<i class="fa-solid fa-money-bill-wave"></i>
Payments
</a>

<a href="settings.html" class="active">
<i class="fa-solid fa-gear"></i>
Settings
</a>

<a href="#" onclick="logout()">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</a>

</div>

<!-- ===========================
MAIN
=========================== -->

<div class="main">

<div class="topbar">

<div class="top-left">

<button id="menuBtn" class="menu-btn">

☰

</button>

<div>

<h1>⚙️ Settings</h1>

<p class="welcome">

Manage your account and website preferences

</p>

</div>

</div>

</div>
<div class="setting-container">

<div class="setting-card">

<h2>
<i class="fa-solid fa-user"></i>
Profile
</h2>

<div style="text-align:center;">

<img
id="profilePreview"
src="https://ui-avatars.com/api/?name=Admin&background=0B3D91&color=fff"
class="profile-image">

<br><br>

<input
type="file"
id="profileImage">

</div>

</div>

<div class="setting-card">

<h2>
<i class="fa-solid fa-lock"></i>
Security
</h2>

<label>New Password</label>

<input
type="password"
id="newPassword"
placeholder="Enter new password">

<label>Confirm Password</label>

<input
type="password"
id="confirmPassword"
placeholder="Confirm password">

</div>

<div class="setting-card">

<h2>
<i class="fa-solid fa-sliders"></i>
Preferences
</h2>

<label>Theme</label>

<select id="theme">

<option>Light Mode</option>

<option>Dark Mode</option>

</select>

<label>Email Notifications</label>

<select id="notification">

<option>Enabled</option>

<option>Disabled</option>

</select>

<label>Certificate Download</label>

<select id="certificate">

<option>Enabled</option>

<option>Disabled</option>

</select>

</div>

</div>

<div style="text-align:center;margin-top:30px;">

<button class="action-btn present-btn save-btn">

<i class="fa-solid fa-floppy-disk"></i>

Save Changes

</button>

</div>

<!-- ===========================
FOOTER
=========================== -->

<footer>

<div class="footer-content">

<p>

© 2027 College Event Manager

</p>

</div>

</footer>

</div>

<script src="settings.js"></script>

</body>

</html>
